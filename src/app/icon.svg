<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#2e6b9e"/>
    </linearGradient>
    <linearGradient id="mountainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7c59"/>
      <stop offset="100%" stop-color="#2d5a3d"/>
    </linearGradient>
    <linearGradient id="peakGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e4d9"/>
      <stop offset="60%" stop-color="#c9c0a8"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e85d2f"/>
      <stop offset="100%" stop-color="#c0391a"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#skyGrad)"/>

  <!-- Sun / moon -->
  <circle cx="24" cy="8" r="3" fill="#f5c842" opacity="0.9"/>

  <!-- Stars -->
  <circle cx="6" cy="6" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="11" cy="4" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="19" cy="5" r="0.4" fill="white" opacity="0.6"/>

  <!-- Back mountain (darker, smaller) -->
  <polygon points="0,22 10,10 20,22" fill="#2d5a3d" clip-path="url(#circle)"/>

  <!-- Front mountain left -->
  <polygon points="-2,31 12,9 26,31" fill="url(#mountainGrad)" clip-path="url(#circle)"/>

  <!-- Snow cap on front mountain -->
  <polygon points="12,9 8.5,17 15.5,17" fill="url(#peakGrad)" opacity="0.95" clip-path="url(#circle)"/>

  <!-- Front mountain right -->
  <polygon points="14,31 24,13 34,31" fill="#3a6647" clip-path="url(#circle)"/>

  <!-- Snow cap right mountain -->
  <polygon points="24,13 21,20 27,20" fill="#ddd8cc" opacity="0.85" clip-path="url(#circle)"/>

  <!-- Ground / forest base -->
  <rect x="0" y="27" width="32" height="5" fill="#1e3d28" clip-path="url(#circle)"/>

  <!-- Pine trees silhouette -->
  <polygon points="4,27 6,21 8,27" fill="#1e3d28"/>
  <polygon points="7,27 9,23 11,27" fill="#1e3d28"/>
  <polygon points="21,27 23,22 25,27" fill="#1e3d28"/>
  <polygon points="24,27 26,24 28,27" fill="#1e3d28"/>

  <!-- Map pin -->
  <ellipse cx="16" cy="22.5" rx="2" ry="1" fill="rgba(0,0,0,0.25)"/>
  <path d="M16 10 C13.5 10 11.5 12 11.5 14.5 C11.5 17.5 16 22 16 22 C16 22 20.5 17.5 20.5 14.5 C20.5 12 18.5 10 16 10Z" fill="url(#pinGrad)"/>
  <circle cx="16" cy="14.5" r="2" fill="white" opacity="0.9"/>

  <!-- Border ring -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#0f2a40" stroke-width="1"/>
</svg>
